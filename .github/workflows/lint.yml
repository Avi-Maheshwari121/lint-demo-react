name: CI Pipeline

# Trigger this workflow whenever a Pull Request is opened against the 'main' branch
on:
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    name: Run ESLint and Unit Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from the Pull Request branch
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Node.js matching your local environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Install dependencies securely
      - name: Install Dependencies
        run: npm ci

      # 4. Run the ESLint script from your package.json
      - name: Run Linter
        run: npm run lint

      # 5. Run the Unit Tests
      - name: Run Tests
        run: npm run test